name: Browser Compatibility Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required so github/codeql-action/upload-sarif can write findings.
permissions:
  security-events: write
  contents: read

jobs:
  compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Cross Guard
        # Once Cross Guard is on PyPI: pip install "crossguard[cli]"
        # For now, install directly from the public source repo.
        run: pip install "crossguard[cli] @ git+https://github.com/muhammademanaftab/CrossGuard.git#subdirectory=code"

      - name: Run compatibility analysis
        # One command, one SARIF — directory analysis now does the loop for us.
        # Score gate at 80% — overall project score is 95%, so this passes.
        run: |
          crossguard analyze src/ \
            --format sarif \
            --output-sarif results.sarif \
            --fail-on-score 80

      - name: Upload SARIF results to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: crossguard

      - name: Upload SARIF as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crossguard-sarif
          path: results.sarif
